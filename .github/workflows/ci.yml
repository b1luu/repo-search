name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang-format-15 clang-tidy-15

      # Hard gate: reject any commit that isn't formatted.
      - name: Check formatting
        run: |
          find src tests \( -name '*.cpp' -o -name '*.h' \) -print0 \
            | xargs -0 clang-format-15 --dry-run --Werror --style=file

      - name: Configure (Debug + compile_commands.json)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build

      # Hard gate: all registered tests must pass.
      - name: Test
        run: ctest --test-dir build --output-on-failure

      # Advisory: clang-tidy findings are shown but do not fail the job.
      # Flip `continue-on-error` to false once the codebase is clean.
      - name: Lint (advisory)
        continue-on-error: true
        run: |
          find src -name '*.cpp' -print0 \
            | xargs -0 clang-tidy-15 -p build
